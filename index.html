<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORO - Delivery Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0053A0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Playful Block Animations */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .scoro-block { 
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        
        /* The "Funny/Jelly" Hover Effect */
        .scoro-block:hover { 
            transform: translateY(-10px) rotate(5deg) scale(1.1); 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }

        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen pb-12">

    <!-- Playful Header -->
    <header class="bg-white shadow-lg border-b-4 border-slate-200 mb-8 pt-10 pb-8">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center">
            <div class="flex gap-2 md:gap-4 mb-5">
                <div class="scoro-block delay-100 w-16 h-16 md:w-20 md:h-20 bg-[#E31B23] rounded-2xl flex items-center justify-center text-white font-black text-3xl md:text-5xl shadow-xl border-b-4 border-red-800">S</div>
                <div class="scoro-block delay-200 w-16 h-16 md:w-20 md:h-20 bg-[#0053A0] rounded-2xl flex items-center justify-center text-[#FFE600] font-black text-3xl md:text-5xl shadow-xl border-b-4 border-blue-900">C</div>
                <div class="scoro-block delay-300 w-16 h-16 md:w-20 md:h-20 bg-[#FFE600] rounded-2xl flex items-center justify-center text-[#0053A0] font-black text-3xl md:text-5xl shadow-xl border-b-4 border-yellow-600">O</div>
                <div class="scoro-block delay-400 w-16 h-16 md:w-20 md:h-20 bg-[#0053A0] rounded-2xl flex items-center justify-center text-white font-black text-3xl md:text-5xl shadow-xl border-b-4 border-blue-900">R</div>
                <div class="scoro-block delay-500 w-16 h-16 md:w-20 md:h-20 bg-[#E31B23] rounded-2xl flex items-center justify-center text-[#FFE600] font-black text-3xl md:text-5xl shadow-xl border-b-4 border-red-800">O</div>
            </div>
            <h1 class="text-slate-500 font-black tracking-[0.2em] uppercase text-xs md:text-sm">
                DIRECT CHEMIST OUTLET • DELIVERY HUB
            </h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Input Form -->
        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-[#0053A0] h-fit sticky top-4">
            <h2 id="formTitle" class="text-xl font-black text-[#0053A0] mb-4 border-b border-slate-200 pb-2 uppercase tracking-wide">Record New Delivery</h2>
            <form id="deliveryForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Patient / Customer Name</label>
                    <input type="text" id="customerName" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#0053A0] font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Date Logged</label>
                    <input type="date" id="deliveryDate" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#0053A0] font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Delivery Address</label>
                    <textarea id="address" required rows="2" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#0053A0] font-medium"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Medication / Products</label>
                    <input type="text" id="products" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#0053A0] font-medium">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="paymentStatus" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white font-bold text-slate-700">
                        <option value="Paid">Paid</option><option value="Pending">Pending</option><option value="Account">Account</option>
                    </select>
                    <select id="deliveryType" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white font-medium">
                        <option value="One-time">One-time</option><option value="Recurring">Recurring</option>
                    </select>
                </div>
                <div id="frequencyWrapper" class="bg-[#FFE600]/10 p-3 rounded-lg border border-[#FFE600]/40">
                    <label class="block text-xs font-bold uppercase text-[#0053A0] mb-1">Recurring Interval (Days)</label>
                    <input type="number" id="frequencyDays" value="30" class="w-full p-2.5 border border-slate-300 rounded-lg font-bold text-[#0053A0]">
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-[#E31B23] hover:bg-[#c2131a] text-white font-black py-3 rounded-lg shadow-md uppercase tracking-wide">Log Delivery</button>
            </form>
        </div>

        <!-- Dashboard -->
        <div class="lg:col-span-2 space-y-8">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-[#FFE600]">
                <h2 class="text-xl font-black mb-4 text-slate-800 flex items-center gap-2 uppercase">⏰ Recurring Deliveries</h2>
                <div id="remindersContainer" class="space-y-3"></div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-[#0053A0]">
                <div class="flex flex-col xl:flex-row xl:items-center justify-between gap-3 mb-4 border-b border-slate-200 pb-3">
                    <h2 class="text-xl font-black text-slate-800 uppercase">All Logs</h2>
                    <div class="flex gap-2">
                        <button onclick="archiveAndClear()" class="text-xs bg-purple-600 text-white px-3 py-2 rounded-lg font-bold">📁 Archive Month</button>
                        <button onclick="exportToCSV()" class="text-xs bg-[#0053A0] text-white px-3 py-2 rounded-lg font-bold">📥 CSV</button>
                    </div>
                </div>
                <table class="w-full text-left">
                    <thead class="text-slate-400 text-xs uppercase"><tr><th class="pb-3">Date</th><th class="pb-3">Customer</th><th class="pb-3">Medication</th><th class="pb-3 text-right">Actions</th></tr></thead>
                    <tbody id="logTableBody" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCeGPGhPLO4j3p2x_uBTC6c67m7Wvm4rPw", authDomain: "warralily-delivery-tracker.firebaseapp.com", projectId: "warralily-delivery-tracker", storageBucket: "warralily-delivery-tracker.firebasestorage.app", messagingSenderId: "806420420099", appId: "1:806420420099:web:638c2e9fd29dca73f2a036", measurementId: "G-R2W5ERQEV9" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const deliveriesCollection = db.collection("deliveries");
        const archiveCollection = db.collection("archive");

        let currentEditingId = null;
        let globalDeliveriesArray = [];

        window.addEventListener('DOMContentLoaded', () => {
            setDefaultDate();
            deliveriesCollection.onSnapshot((snapshot) => {
                globalDeliveriesArray = [];
                snapshot.forEach((doc) => globalDeliveriesArray.push(doc.data()));
                renderUI(globalDeliveriesArray);
            });
        });

        function getLocalTodayString() { const today = new Date(); return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`; }
        function getLocalMonthYearString() { const today = new Date(); const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]; return `${months[today.getMonth()]}_${today.getFullYear()}`; }
        function setDefaultDate() { document.getElementById('deliveryDate').value = getLocalTodayString(); }
        function parseLocalDate(dateStr) { const [year, month, day] = dateStr.split('-').map(Number); return new Date(year, month - 1, day); }

        document.getElementById('deliveryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const idToUse = currentEditingId ? currentEditingId : Date.now();
            const deliveryData = { id: idToUse, customerName: document.getElementById('customerName').value, date: document.getElementById('deliveryDate').value, address: document.getElementById('address').value, products: document.getElementById('products').value, paymentStatus: document.getElementById('paymentStatus').value, type: document.getElementById('deliveryType').value, frequency: parseInt(document.getElementById('frequencyDays').value) || 30 };
            await deliveriesCollection.doc(idToUse.toString()).set(deliveryData);
            resetForm();
        });

        async function archiveAndClear() {
            if(!confirm("Move one-time entries to Archive?")) return;
            const batch = db.batch();
            const archiveDate = getLocalMonthYearString();
            for (const item of globalDeliveriesArray) {
                if(item.type !== 'Recurring') {
                    batch.set(archiveCollection.doc(item.id.toString()), { ...item, archived_month: archiveDate });
                    batch.delete(deliveriesCollection.doc(item.id.toString()));
                }
            }
            await batch.commit();
        }

        async function completeReminder(id) {
            const item = globalDeliveriesArray.find(d => d.id === id);
            if (!item) return;
            if (confirm(`Roll forward schedule for ${item.customerName}?`)) {
                const newId = Date.now();
                const rolledDelivery = { ...item, id: newId, date: getLocalTodayString() };
                await deliveriesCollection.doc(newId.toString()).set(rolledDelivery);
            }
        }

        function editDelivery(id) {
            const item = globalDeliveriesArray.find(d => d.id === id);
            if (!item) return;
            currentEditingId = id;
            document.getElementById('customerName').value = item.customerName;
            document.getElementById('deliveryDate').value = item.date;
            document.getElementById('address').value = item.address;
            document.getElementById('products').value = item.products;
            document.getElementById('paymentStatus').value = item.paymentStatus;
            document.getElementById('deliveryType').value = item.type;
            document.getElementById('frequencyDays').value = item.frequency || 30;
            document.getElementById('deliveryForm').scrollIntoView({ behavior: 'smooth' });
        }

        async function deleteDelivery(id) {
            if (confirm("Delete permanently?")) {
                await deliveriesCollection.doc(id.toString()).delete();
            }
        }

        function resetForm() {
            currentEditingId = null;
            document.getElementById('deliveryForm').reset();
            setDefaultDate();
        }

        function renderUI(deliveries) {
            const logTableBody = document.getElementById('logTableBody');
            const remindersContainer = document.getElementById('remindersContainer');
            logTableBody.innerHTML = ''; remindersContainer.innerHTML = '';

            [...deliveries].sort((a,b) => parseLocalDate(b.date) - parseLocalDate(a.date)).forEach(item => {
                logTableBody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="py-3 font-bold text-slate-600">${item.date}</td>
                        <td class="py-3 font-bold text-slate-800">${item.customerName}</td>
                        <td class="py-3 text-[#0053A0] font-bold">${item.products}</td>
                        <td class="py-3 text-right">
                            <button onclick="editDelivery(${item.id})" class="text-xs font-bold text-[#0053A0] mr-2">Edit</button>
                            <button onclick="deleteDelivery(${item.id})" class="text-xs font-bold text-red-600">Delete</button>
                        </td>
                    </tr>
                `;
            });

            const recurringItems = deliveries.filter(d => d.type === 'Recurring');
            const latestRecurringMap = {};
            recurringItems.forEach(item => {
                const key = item.customerName.toLowerCase().trim();
                if (!latestRecurringMap[key] || parseLocalDate(item.date) > parseLocalDate(latestRecurringMap[key].date)) latestRecurringMap[key] = item;
            });

            const today = parseLocalDate(getLocalTodayString());
            Object.values(latestRecurringMap).forEach(item => {
                const dueDate = new Date(parseLocalDate(item.date));
                dueDate.setDate(dueDate.getDate() + (item.frequency || 30));
                const daysRemaining = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
                remindersContainer.innerHTML += `
                    <div class="p-3 bg-slate-50 border-l-4 border-[#0053A0] rounded shadow-sm flex justify-between items-center">
                        <div><h4 class="font-black text-slate-800 text-sm">${item.customerName}</h4><p class="text-xs text-slate-500">Due in ${daysRemaining} days</p></div>
                        <button onclick="completeReminder(${item.id})" class="bg-emerald-600 text-white px-3 py-1 rounded font-black text-xs">Done</button>
                    </div>
                `;
            });
        }

        function exportToCSV() {
            const headers = ["Date", "Customer Name", "Address", "Products", "Payment Status", "Type", "Frequency"];
            const csvRows = [headers.join(",")];
            globalDeliveriesArray.forEach(item => csvRows.push([`"${item.date}"`, `"${item.customerName}"`, `"${item.address}"`, `"${item.products}"`, `"${item.paymentStatus}"`, `"${item.type}"`, `"${item.frequency}"`].join(",")));
            const blob = new Blob(["\ufeff" + csvRows.join("\r\n")], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.setAttribute("download", `delivery_log_${getLocalMonthYearString()}.csv`); link.click();
        }
    </script>
</body>
</html>
